<form
  [formGroup]="signupForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-4 p-7 bg-white rounded-2xl card-shadow w-full"
>
  <div class="flex flex-col">
    <span class="txt-semibold-22px"> Create Account </span>
    <span class="txt-accent txt-light-12px"> Sign up to start tracking your expenses </span>
  </div>

  <!-- Username -->
  <app-text-box
    id="username"
    type="text"
    formControlName="username"
    placeholder="Choose a username"
    label="Username"
    [control]="signupForm.controls.username"
    [errors]="{ required: 'Username is required' }"
  />

  <!-- Password -->
  <app-text-box
    id="password"
    type="password"
    formControlName="password"
    placeholder="Create a password"
    label="Password"
    [control]="signupForm.controls.password"
    [errors]="{
      required: 'Password is required',
      minlength: 'Password must be at least 6 characters',
    }"
  />

  <!-- Confirm Password -->
  <app-text-box
    id="confirmPassword"
    type="password"
    formControlName="confirmPassword"
    placeholder="Confirm your password"
    label="Confirm Password"
    [control]="signupForm.controls.confirmPassword"
    [errors]="{
      required: 'Confirm your password',
      minlength: 'Password must be at least 6 characters',
      mismatch: 'Passwords do not match',
    }"
  />

  <!-- Submit -->
  <button
    type="submit"
    [disabled]="signupForm.invalid || loading()"
    class="w-full mt-2 py-2.5 rounded-xl font-medium text-sm transition-all bg-yellow-gradient button-shadow inline-flex items-center justify-center"
    [class]="
      signupForm.invalid || loading()
        ? 'opacity-50 cursor-not-allowed'
        : 'hover:shadow-lg hover:brightness-105 cursor-pointer'
    "
  >
    @if (loading()) {
      <i class="fa-solid fa-spinner me-2"></i>
      <span>Creating Account…</span>
    } @else {
      <span>Create Account</span>
    }
  </button>
  @if (errorMessage()) {
    <div class="mt-1 p-3 rounded-xl text-center txt-medium-14px bg-red-50 text-red-700">
      {{ errorMessage() }}
    </div>
  }
</form>

<div class="flex justify-center mt-2">
  <span class="txt-accent txt-light-16px"> Already have an account? </span>&nbsp;
  <button (click)="signIn()" class="txt-accent txt-medium-16px">Sign in</button>
</div>
