<form
  [formGroup]="loginForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-4 p-7 bg-white rounded-2xl card-shadow"
>
  <div class="flex flex-col">
    <span class="txt-semibold-22px"> Welcome back </span>
    <span class="txt-accent txt-light-12px"> Sign in to continue tracking your expenses </span>
  </div>

  <!-- Username -->
  <app-text-box
    id="username"
    type="text"
    formControlName="username"
    placeholder="Enter your username"
    label="Username"
    [control]="loginForm.controls.username"
    [errors]="{ required: 'Username is required' }"
  />

  <!-- Password -->
  <app-text-box
    id="password"
    type="password"
    formControlName="password"
    placeholder="Enter your password"
    label="Password"
    [control]="loginForm.controls.password"
    [errors]="{
      required: 'Password is required',
      minlength: 'Password must be at least 6 characters',
    }"
  />

  <!-- Submit -->
  <app-button
    variant="secondary"
    size="sm"
    type="submit"
    [fullWidth]="true"
    [loading]="loading()"
    [disabled]="loginForm.invalid || loading()"
    [text]="loading() ? 'Signing In…' : 'Sign In'"
  />
  @if (errorMessage()) {
    <div class="mt-1 p-3 rounded-xl text-center txt-medium-14px bg-red-50 text-red-700">
      {{ errorMessage() }}
    </div>
  }
</form>

<div class="flex flex-col md:flex-row justify-center items-center mt-2">
  <span class="txt-accent txt-light-16px"> Don't have an account? </span>
  <app-button variant="link" (click)="signUp()" text="&nbsp;Create account" />
</div>
