<form
  [formGroup]="loginForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-4 p-7 bg-white rounded-2xl card-shadow"
>
  <div class="flex flex-col">
    <span class="txt-semibold-22px"> Welcome back </span>
    <span class="txt-accent txt-light-12px"> Sign in to continue tracking your expenses </span>
  </div>

  <!-- Username -->
  <app-text-box
    id="username"
    type="text"
    formControlName="username"
    placeholder="Enter your username"
    label="Username"
    [control]="loginForm.controls.username"
    [errors]="{ required: 'Username is required' }"
  />

  <!-- Password -->
  <app-text-box
    id="password"
    type="password"
    formControlName="password"
    placeholder="Enter your password"
    label="Password"
    [control]="loginForm.controls.password"
    [errors]="{
      required: 'Password is required',
      minlength: 'Password must be at least 6 characters',
    }"
  />

  <!-- Submit -->
  <button
    type="submit"
    [disabled]="loginForm.invalid || loading()"
    class="w-full mt-2 py-2.5 rounded-xl font-medium text-sm transition-all bg-yellow-gradient button-shadow"
    [class]="
      loginForm.invalid || loading()
        ? 'opacity-50 cursor-not-allowed'
        : 'hover:shadow-lg hover:brightness-105 cursor-pointer'
    "
  >
    @if (loading()) {
      <i class="fa-solid fa-spinner me-1"></i>
      <span>Signing In…</span>
    } @else {
      <span>Sign In</span>
    }
  </button>
</form>

<div class="flex flex-col md:flex-row justify-center items-center mt-2">
  <span class="txt-accent txt-light-16px"> Don't have an account? </span>
  <button (click)="signUp()" class="txt-accent txt-medium-16px">&nbsp;Create account</button>
</div>
